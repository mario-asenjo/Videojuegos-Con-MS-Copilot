<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Flappy Copilot</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #87cefa;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: #ffffff;
    }

    #game-container {
      position: relative;
      width: 480px;
      height: 640px;
      background: #87cefa;
      border: 4px solid #ffffff;
      border-radius: 8px;
      overflow: hidden;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #87cefa;
    }

    /* Pantallas superpuestas */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      background: rgba(0, 0, 0, 1); /* AHORA 100% OPACO */
      color: #ffffff;
    }

    .hidden {
      display: none;
    }

    .title {
      font-size: 40px;
      font-weight: 800;
      margin-bottom: 16px;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
    }

    .subtitle {
      font-size: 20px;
      margin-bottom: 12px;
    }

    .info {
      font-size: 16px;
      margin-bottom: 8px;
    }

    .big-text {
      font-size: 24px;
      font-weight: 700;
      margin-top: 12px;
    }

    #hud {
      position: absolute;
      top: 8px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.4);
    }

    #footer-hint {
      position: absolute;
      bottom: 6px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: #e0f7ff;
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.5);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="480" height="640"></canvas>

    <div id="hud">0</div>

    <div id="start-screen" class="overlay">
      <div class="title">Flappy Copilot</div>
      <div class="subtitle">Arcade 2D de reflejos</div>
      <div class="info">Controles:</div>
      <div class="info">Barra espaciadora → saltar</div>
      <div class="info">Enter ↵ → iniciar</div>
      <div class="big-text">Pulsa Enter para empezar</div>
    </div>

    <div id="gameover-screen" class="overlay hidden">
      <div class="title">Fin de la partida</div>
      <div id="final-score" class="big-text">Puntuación: 0</div>
      <div id="best-score" class="info">Mejor puntuación: 0</div>
      <div class="big-text">Pulsa Enter para reiniciar</div>
    </div>

    <div id="footer-hint">Flappy Copilot · HTML, CSS y JavaScript puro</div>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const startScreen = document.getElementById("start-screen");
    const gameOverScreen = document.getElementById("gameover-screen");
    const hud = document.getElementById("hud");
    const finalScoreLabel = document.getElementById("final-score");
    const bestScoreLabel = document.getElementById("best-score");

    const STATE_START = "start";
    const STATE_PLAYING = "playing";
    const STATE_GAMEOVER = "gameover";

    let gameState = STATE_START;

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    const groundHeight = 80;

    const player = {
      x: 120,
      y: HEIGHT / 2,
      radius: 18,
      vy: 0,
      gravity: 0.45,
      jumpStrength: -7.5
    };

    const pipes = [];
    const pipeWidth = 70;
    const pipeGapBase = 150;
    let pipeGap = pipeGapBase;
    let pipeSpeed = 2.4;
    let pipeSpawnInterval = 1500;
    let lastPipeTime = 0;

    let score = 0;
    let bestScore = 0;

    let lastTime = 0;

    const difficultyIncreaseInterval = 5000;
    let lastDifficultyIncrease = 0;

    function resetGame() {
      player.y = HEIGHT / 2;
      player.vy = 0;

      pipes.length = 0;
      score = 0;
      hud.textContent = "0";

      pipeGap = pipeGapBase;
      pipeSpeed = 2.4;
      pipeSpawnInterval = 1500;
      lastPipeTime = 0;
      lastDifficultyIncrease = 0;
    }

    function setGameState(state) {
      gameState = state;

      if (state === STATE_START) {
        startScreen.classList.remove("hidden");
        gameOverScreen.classList.add("hidden");
      } else if (state === STATE_PLAYING) {
        startScreen.classList.add("hidden");
        gameOverScreen.classList.add("hidden");
      } else if (state === STATE_GAMEOVER) {
        startScreen.classList.add("hidden");
        gameOverScreen.classList.remove("hidden");
      }
    }

    /* CONTROL DE TECLAS */
    window.addEventListener("keydown", (e) => {
      if (e.code === "Enter") {
        if (gameState === STATE_START) {
          resetGame();
          setGameState(STATE_PLAYING);
        } else if (gameState === STATE_GAMEOVER) {
          resetGame();
          setGameState(STATE_PLAYING);
        }
      }

      if (e.code === "Space") {
        if (gameState === STATE_PLAYING) {
          player.vy = player.jumpStrength;
        }
        /* YA NO REINICIA CON ESPACIO */
      }
    });

    function spawnPipe() {
      const marginTop = 40;
      const marginBottom = 40 + groundHeight;
      const maxGapY = HEIGHT - marginBottom - pipeGap;
      const minGapY = marginTop;

      const gapY = Math.random() * (maxGapY - minGapY) + minGapY;

      pipes.push({
        x: WIDTH + pipeWidth,
        gapY: gapY,
        passed: false
      });
    }

    function checkCollision() {
      if (player.y + player.radius > HEIGHT - groundHeight) return true;
      if (player.y - player.radius < 0) return true;

      for (let p of pipes) {
        const pipeLeft = p.x;
        const pipeRight = p.x + pipeWidth;
        const gapTop = p.gapY;
        const gapBottom = p.gapY + pipeGap;

        if (player.x + player.radius > pipeLeft && player.x - player.radius < pipeRight) {
          if (player.y - player.radius < gapTop || player.y + player.radius > gapBottom) {
            return true;
          }
        }
      }
      return false;
    }

    function update(deltaTime) {
      lastDifficultyIncrease += deltaTime;
      if (lastDifficultyIncrease > difficultyIncreaseInterval) {
        lastDifficultyIncrease = 0;
        pipeSpeed += 0.2;
        pipeGap = Math.max(110, pipeGap - 5);
        pipeSpawnInterval = Math.max(900, pipeSpawnInterval - 60);
      }

      player.vy += player.gravity;
      player.y += player.vy;

      lastPipeTime += deltaTime;
      if (lastPipeTime > pipeSpawnInterval) {
        lastPipeTime = 0;
        spawnPipe();
      }

      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= pipeSpeed;

        if (!p.passed && p.x + pipeWidth < player.x) {
          p.passed = true;
          score++;
          hud.textContent = score.toString();
        }

        if (p.x + pipeWidth < -50) {
          pipes.splice(i, 1);
        }
      }

      if (checkCollision()) {
        if (score > bestScore) bestScore = score;
        finalScoreLabel.textContent = "Puntuación: " + score;
        bestScoreLabel.textContent = "Mejor puntuación: " + bestScore;
        setGameState(STATE_GAMEOVER);
      }
    }

    function drawBackground() {
      ctx.fillStyle = "#87cefa";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "#2e8b57";
      ctx.fillRect(0, HEIGHT - groundHeight, WIDTH, groundHeight);

      ctx.strokeStyle = "#1f5c3a";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, HEIGHT - groundHeight);
      ctx.lineTo(WIDTH, HEIGHT - groundHeight);
      ctx.stroke();
    }

    function drawPipes() {
      ctx.fillStyle = "#228b22";
      ctx.strokeStyle = "#145214";
      ctx.lineWidth = 3;

      pipes.forEach((p) => {
        const x = p.x;
        const gapY = p.gapY;

        const topHeight = gapY;
        ctx.fillRect(x, 0, pipeWidth, topHeight);
        ctx.strokeRect(x, 0, pipeWidth, topHeight);

        ctx.fillRect(x - 4, topHeight - 20, pipeWidth + 8, 20);
        ctx.strokeRect(x - 4, topHeight - 20, pipeWidth + 8, 20);

        const bottomY = gapY + pipeGap;
        const bottomHeight = HEIGHT - groundHeight - bottomY;
        ctx.fillRect(x, bottomY, pipeWidth, bottomHeight);
        ctx.strokeRect(x, bottomY, pipeWidth, bottomHeight);

        ctx.fillRect(x - 4, bottomY, pipeWidth + 8, 20);
        ctx.strokeRect(x - 4, bottomY, pipeWidth + 8, 20);
      });
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);

      ctx.beginPath();
      ctx.arc(4, 4, player.radius, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.fill();

      ctx.beginPath();
      ctx.arc(0, 0, player.radius, 0, Math.PI * 2);

      const gradient = ctx.createRadialGradient(-6, -6, 4, 0, 0, player.radius);
      gradient.addColorStop(0, "#d8b4ff");
      gradient.addColorStop(1, "#a855f7");

      ctx.fillStyle = gradient;
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = "#6b21a8";
      ctx.stroke();

      ctx.beginPath();
      ctx.ellipse(-6, 2, 10, 6, -0.4, 0, Math.PI * 2);
      ctx.fillStyle = "#e9d5ff";
      ctx.fill();
      ctx.strokeStyle = "#6b21a8";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(6, -6, 5, 0, Math.PI * 2);
      ctx.fillStyle = "#ffffff";
      ctx.fill();
      ctx.strokeStyle = "#000000";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(7, -6, 2, 0, Math.PI * 2);
      ctx.fillStyle = "#000000";
      ctx.fill();

      ctx.beginPath();
      ctx.moveTo(player.radius - 2, -2);
      ctx.lineTo(player.radius + 10, 0);
      ctx.lineTo(player.radius - 2, 2);
      ctx.closePath();
      ctx.fillStyle = "#ff8c00";
      ctx.fill();
      ctx.strokeStyle = "#cc7000";
      ctx.stroke();

      ctx.restore();
    }

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const deltaTime = timestamp - lastTime;
      lastTime = timestamp;

      drawBackground();

      if (gameState === STATE_PLAYING) update(deltaTime);

      drawPipes();
      drawPlayer();

      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
    setGameState(STATE_START);
  </script>
</body>
</html>
